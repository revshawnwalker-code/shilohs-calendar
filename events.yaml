# Shiloh's Calendar — schedule source
#
# Edit this file to add, change, or remove events, then commit and push
# (or edit it directly on github.com). A GitHub Action rebuilds the
# calendar feed automatically within a minute or two of your push.
#
# Event fields:
#   title        required
#   description  optional
#   location     optional (e.g. a Zoom link or room name)
#   start / end  required, local time, format: YYYY-MM-DDTHH:MM:SS
#   recurrence   optional: WEEKLY (omit for a one-time event)
#   until        optional end date for a recurring event, format: YYYY-MM-DD

