name: Add event from issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  add-event:
    if: contains(github.event.issue.labels.*.name, 'new-event')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install pyyaml tzdata

      - name: Parse issue and append event
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: python .github/scripts/add_event.py

      - name: Validate calendar still builds
        run: python generate_ics.py

      - name: Commit and push
        run: |
          git config user.name "shilohs-calendar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add events.yaml
          git commit -m "Add event via issue #${{ github.event.issue.number }}"
          git push

      - name: Comment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "✅ Added! Your calendar will update within a minute or two.",
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: "closed",
            });

      - name: Comment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: "⚠️ Nothing was changed — one of the fields didn't match the expected format. Please double check the date (YYYY-MM-DD) and time (HH:MM) fields and open a new 'Add a Calendar Event' issue.",
            });
